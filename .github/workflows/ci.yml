name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd Project/Phone-marketplace
          npm install

      - name: Generate Prisma Client
        run: |
          cd Project/Phone-marketplace
          npx prisma generate

      - name: Run lint
        run: |
          cd Project/Phone-marketplace
          npm run lint

      - name: Build project
        run: |
          cd Project/Phone-marketplace
          npm run build
